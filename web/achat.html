<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achat d'accès</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        .container {
            max-width: 400px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        }
        button {
            background-color: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Accès réservé</h2>
        <p>Pour accéder à cette application, vous devez acheter un accès.</p>
        <button onclick="redirectToPayment()">Acheter maintenant</button>
    </div>

    <script>
        function redirectToPayment() {
            // Remplace cette URL par celle de ton paiement Stripe
            window.location.href = "https://buy.stripe.com/3csdSyb6HdjR6fCaEF";
        }
    </script>

</body>
</html>
